<!DOCTYPE html>
<html lang="ru">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Важный выбор</title>
    <style>
        body {
            margin: 0;
            height: 100vh;
            font-family: 'Arial', sans-serif;
            background-color: #f0f2f5;
            position: relative;
            overflow: hidden; /* Чтобы не появлялись полосы прокрутки, когда кнопка убегает */
        }

        h1 {
            color: #333;
            text-align: center;
            position: absolute;
            top: 25%;
            width: 100%;
            margin: 0;
        }

        button {
            padding: 15px 40px;
            font-size: 20px;
            font-weight: bold;
            border: none;
            border-radius: 8px;
            cursor: pointer;
            position: absolute; /* Обе кнопки позиционируются отдельно */
            top: 50%;
        }

        /* Кнопка ДА — фиксированная слева */
        #yesBtn {
            background-color: #4CAF50;
            color: white;
            left: 30%;
            transform: translateX(-50%);
        }

        /* Кнопка НЕТ — изначально стоит справа, а потом убегает */
        #noBtn {
            background-color: #f44336;
            color: white;
            left: 70%;
            transform: translateX(-50%);
            transition: left 0.1s ease, top 0.1s ease; /* Плавное убегание */
        }
    </style>
</head>
<body>

    <h1>обой жасап береснба </h1>

    <button id="yesBtn" onclick="sayYes()">Да</button>
    <button id="noBtn" onmouseover="runAway()" onclick="runAway()">Нет</button>

    <script>
        function runAway() {
            const noBtn = document.getElementById('noBtn');
            
            // Получаем размеры экрана за вычетом размеров кнопки
            const maxX = window.innerWidth - noBtn.offsetWidth;
            const maxY = window.innerHeight - noBtn.offsetHeight;
            
            // Генерируем абсолютно случайные координаты на всём экране
            const randomX = Math.floor(Math.random() * maxX);
            const randomY = Math.floor(Math.random() * maxY);
            
            // Убираем центрирование через transform, чтобы кнопка вставала точно в координаты
            noBtn.style.transform = 'none';
            
            // Перемещаем
            noBtn.style.left = randomX + 'px';
            noBtn.style.top = randomY + 'px';
        }

        function sayYes() {
            alert('жберси енди ');
        }
    </script>

</body>
</html>
